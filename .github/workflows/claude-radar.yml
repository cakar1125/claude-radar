name: Claude Radar

on:
  schedule:
    - cron: '30 14 * * 0,1,3,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic -q

      - name: Agent calistir
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_agent.py .github/prompts/claude-radar.md

      - name: Commit ve push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          git diff --staged --quiet || git commit -m "$(date +%Y-%m-%d) claude radar"
          git push
